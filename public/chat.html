<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brayan-bot · prueba local</title>
<style>
  :root { --bg:#e9edef; --hdr:#075e54; --me:#d9fdd3; --bot:#ffffff; --txt:#111b21; --muted:#667781; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); }
  .wrap { max-width:520px; margin:0 auto; height:100dvh; display:flex; flex-direction:column; background:#efeae2; }
  header { background:var(--hdr); color:#fff; padding:12px 16px; display:flex; align-items:center; gap:10px; }
  header .av { width:38px; height:38px; border-radius:50%; background:#128c7e; display:grid; place-items:center; font-weight:700; }
  header .t b { display:block; font-size:15px; }
  header .t small { color:#cfe9e2; font-size:12px; }
  header .reset { margin-left:auto; background:rgba(255,255,255,.15); color:#fff; border:0; padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer; }
  #msgs { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:6px;
          background-image:linear-gradient(rgba(229,221,213,.6),rgba(229,221,213,.6)); }
  .b { max-width:78%; padding:7px 10px; border-radius:10px; font-size:14.5px; line-height:1.35; white-space:pre-wrap; word-wrap:break-word; box-shadow:0 1px .5px rgba(0,0,0,.08); }
  .b a { color:#027eb5; }
  .me { align-self:flex-end; background:var(--me); border-top-right-radius:2px; }
  .bot { align-self:flex-start; background:var(--bot); border-top-left-radius:2px; }
  .typing { align-self:flex-start; color:var(--muted); font-size:13px; font-style:italic; padding:4px 10px; }
  footer { display:flex; gap:8px; padding:10px; background:#f0f2f5; }
  #in { flex:1; border:0; border-radius:22px; padding:11px 14px; font-size:14.5px; outline:none; }
  #send { border:0; background:var(--hdr); color:#fff; width:44px; height:44px; border-radius:50%; font-size:18px; cursor:pointer; }
  #send:disabled { opacity:.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="av">B</div>
    <div class="t"><b>Brayan</b><small>prueba local · E-Master</small></div>
    <button class="reset" onclick="location.reload()">Reiniciar chat</button>
  </header>
  <div id="msgs"></div>
  <footer>
    <input id="in" placeholder="Escribe un mensaje…" autocomplete="off" />
    <button id="send" title="Enviar">➤</button>
  </footer>
</div>
<script>
  // Número de "prueba" único por carga → cada reinicio = prospecto nuevo.
  const FROM = "whatsapp:+1555" + Math.floor(1000000 + Math.random() * 8999999);
  const msgs = document.getElementById("msgs");
  const input = document.getElementById("in");
  const sendBtn = document.getElementById("send");

  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  // Igual que WhatsApp: escapa HTML, *texto* → negrita, y convierte URLs en links.
  function format(s){
    return esc(s)
      .replace(/\*([^*\n]+)\*/g, "<b>$1</b>")
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
  }

  function bubble(text, who){
    const d = document.createElement("div");
    d.className = "b " + who;
    d.innerHTML = format(text);
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function typing(on){
    let t = document.getElementById("typing");
    if(on && !t){ t=document.createElement("div"); t.id="typing"; t.className="typing"; t.textContent="Brayan está escribiendo…"; msgs.appendChild(t); msgs.scrollTop=msgs.scrollHeight; }
    if(!on && t) t.remove();
  }

  async function send(){
    const text = input.value.trim();
    if(!text) return;
    input.value=""; bubble(text, "me"); sendBtn.disabled=true; typing(true);
    try {
      const body = new URLSearchParams({ Body:text, From:FROM });
      const res = await fetch("/webhook", { method:"POST", headers:{ "Content-Type":"application/x-www-form-urlencoded" }, body });
      const xml = await res.text();
      const doc = new DOMParser().parseFromString(xml, "text/xml");
      const parts = [...doc.getElementsByTagName("Message")].map(m => m.textContent.trim()).filter(Boolean);
      typing(false);
      if(parts.length === 0){ bubble("(sin respuesta — ¿es un saludo con el saludo diferido activo? pon SALUDO_DELAY_MAX_MS=0)", "bot"); }
      // muestra cada burbuja con un pequeño retraso, como una persona real
      for(let i=0;i<parts.length;i++){ await new Promise(r=>setTimeout(r, i===0?0:550)); bubble(parts[i], "bot"); }
    } catch(e){
      typing(false); bubble("⚠️ No pude conectar con el bot. ¿Está corriendo en este puerto? ("+e.message+")", "bot");
    } finally { sendBtn.disabled=false; input.focus(); }
  }
  sendBtn.onclick = send;
  input.addEventListener("keydown", e => { if(e.key==="Enter") send(); });
  bubble("👋 Escríbele para probar (ej: \"Hola\"). Cada \"Reiniciar chat\" arranca un prospecto nuevo.", "bot");
  input.focus();
</script>
</body>
</html>
